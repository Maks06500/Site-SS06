<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SS06 - Boutique</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', sans-serif; background: #0a0a0a; color: white; }
        
        /* Menu Hamburger */
        .menu-btn { position: absolute; top: 20px; left: 20px; cursor: pointer; font-size: 24px; z-index: 1001; }
        
        /* Conteneur Formulaire (Caché par défaut) */
        .auth-overlay {
            display: none; position: absolute; top: 60px; left: 20px; z-index: 1000;
            background: #1a1a1a; padding: 20px; border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); width: 250px; border: 1px solid #333;
        }

        input { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #444; border-radius: 8px; background: #000; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #e50914; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: white; }
        .toggle-link { margin-top: 10px; font-size: 0.8rem; color: #aaa; cursor: pointer; text-decoration: underline; }

        /* Style Boutique */
        .container { max-width: 800px; margin: 0 auto; padding: 100px 20px; text-align: center; }
        .product-card { background: #111; padding: 20px; border-radius: 20px; border: 1px solid #333; }
        .price { font-size: 1.5rem; color: #e50914; font-weight: bold; margin: 20px 0; }
        .btn-cart { background: #8b0000; padding: 15px; width: 100%; border: none; border-radius: 10px; color: white; font-weight: bold; margin-top: 10px; }

        #homePage { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); display: none; text-align: center; background: #1a1a1a; padding: 40px; border-radius: 20px; opacity: 1; transition: opacity 0.5s ease; }
    </style>
</head>
<body>

    <div class="menu-btn" id="menuBtn">☰</div>

    <div class="auth-overlay" id="authCard">
        <h4 id="formTitle" style="margin-top:0;">Connexion</h4>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Mot de passe">
        <input type="password" id="passwordConfirm" placeholder="Confirmer mot de passe" style="display:none;">
        <button id="mainBtn">Se connecter</button>
        <div class="toggle-link" id="toggleBtn">Pas de compte ? Créer un compte</div>
    </div>

    <div class="container">
        <div class="product-card">
            <h1>Nitro Boost 1 Month</h1>
            <div class="price">€2.55</div>
            <button class="btn-cart">Buy Now ➡️</button>
        </div>
    </div>

    <div id="homePage">
        <h2>Connecté !</h2>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAiUzs4ymw1o82ayQ6ywWKZjYC7WXAT3aU",
            authDomain: "site-ss06.firebaseapp.com",
            projectId: "site-ss06",
            storageBucket: "site-ss06.firebasestorage.app",
            messagingSenderId: "473910979829",
            appId: "1:473910979829:web:59ca78239e8527cb7e69bc",
            measurementId: "G-RZD5CQ5H21"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Sélection
        const menuBtn = document.getElementById('menuBtn');
        const authCard = document.getElementById('authCard');
        const homePage = document.getElementById('homePage');
        const mainBtn = document.getElementById('mainBtn');
        const toggleBtn = document.getElementById('toggleBtn');
        const passConfirm = document.getElementById('passwordConfirm');
        let isLogin = true;

        // Afficher/Cacher le menu
        menuBtn.addEventListener('click', () => {
            authCard.style.display = authCard.style.display === 'block' ? 'none' : 'block';
        });

        toggleBtn.addEventListener('click', () => {
            isLogin = !isLogin;
            document.getElementById('formTitle').innerText = isLogin ? "Connexion" : "Inscription";
            mainBtn.innerText = isLogin ? "Se connecter" : "Créer le compte";
            toggleBtn.innerText = isLogin ? "Pas de compte ? Créer un compte" : "Déjà un compte ? Connexion";
            passConfirm.style.display = isLogin ? "none" : "block";
        });

        function showHome() {
            authCard.style.display = "none";
            homePage.style.display = "block";
            setTimeout(() => {
                homePage.style.opacity = "0";
                setTimeout(() => { homePage.style.display = "none"; }, 500);
            }, 3000);
        }

        mainBtn.addEventListener('click', () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            if (isLogin) {
                signInWithEmailAndPassword(auth, email, password).then(showHome).catch(e => alert(e.message));
            } else {
                if (password !== passConfirm.value) return alert("Mots de passe différents");
                createUserWithEmailAndPassword(auth, email, password).then(showHome).catch(e => alert(e.message));
            }
        });
    </script>
</body>
</html>
