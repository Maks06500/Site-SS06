<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SS06 - Boutique</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', sans-serif; background: #0a0a0a; color: white; }
        
        /* Menu Hamburger en haut à droite */
        .menu-btn { position: absolute; top: 20px; right: 20px; cursor: pointer; font-size: 24px; z-index: 1001; }
        
        /* Menu latéral */
        .sidebar {
            display: none; position: absolute; top: 0; right: 0; width: 250px; height: 100%;
            background: #1a1a1a; padding: 60px 20px; z-index: 1000; box-shadow: -5px 0 15px rgba(0,0,0,0.5);
        }
        
        /* Formulaire intégré dans le menu */
        .auth-section { display: none; margin-top: 20px; border-top: 1px solid #333; padding-top: 20px; }
        
        input { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #444; border-radius: 8px; background: #000; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #e50914; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: white; }
        .nav-link { cursor: pointer; padding: 10px 0; display: block; border-bottom: 1px solid #333; }

        .container { max-width: 800px; margin: 0 auto; padding: 100px 20px; text-align: center; }
        .product-card { background: #111; padding: 20px; border-radius: 20px; border: 1px solid #333; }
        .btn-cart { background: #8b0000; padding: 15px; width: 100%; border: none; border-radius: 10px; color: white; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="menu-btn" id="menuBtn">☰</div>

    <div class="sidebar" id="sidebar">
        <div class="nav-link">Home</div>
        <div class="nav-link">Products</div>
        <div class="nav-link" id="accountMenu">Comptes ▾</div>
        
        <div class="auth-section" id="authSection">
            <h4 id="formTitle">Connexion</h4>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="password" placeholder="Mot de passe">
            <button id="mainBtn">Se connecter</button>
            <div id="toggleBtn" style="font-size: 0.7rem; margin-top:10px; cursor:pointer; color:#aaa;">Pas de compte ? Créer un compte</div>
        </div>
    </div>

    <div class="container">
        <div class="product-card">
            <h1>Nitro Boost 1 Month</h1>
            <button class="btn-cart">Buy Now ➡️</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";

        const firebaseConfig = { /* ... ton config Firebase ... */ };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Sélection des éléments
        const menuBtn = document.getElementById('menuBtn');
        const sidebar = document.getElementById('sidebar');
        const accountMenu = document.getElementById('accountMenu');
        const authSection = document.getElementById('authSection');
        const mainBtn = document.getElementById('mainBtn');
        const toggleBtn = document.getElementById('toggleBtn');
        let isLogin = true;

        // Ouvrir le menu latéral
        menuBtn.addEventListener('click', () => {
            sidebar.style.display = sidebar.style.display === 'block' ? 'none' : 'block';
        });

        // Dérouler le menu Comptes
        accountMenu.addEventListener('click', () => {
            authSection.style.display = authSection.style.display === 'block' ? 'none' : 'block';
        });

        // Basculer Connexion / Inscription
        toggleBtn.addEventListener('click', () => {
            isLogin = !isLogin;
            document.getElementById('formTitle').innerText = isLogin ? "Connexion" : "Inscription";
            mainBtn.innerText = isLogin ? "Se connecter" : "Créer le compte";
            toggleBtn.innerText = isLogin ? "Pas de compte ? Créer un compte" : "Déjà un compte ? Connexion";
        });

        // Logique Firebase
        mainBtn.addEventListener('click', () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            if (isLogin) {
                signInWithEmailAndPassword(auth, email, password).then(() => alert("Connecté !")).catch(e => alert(e.message));
            } else {
                createUserWithEmailAndPassword(auth, email, password).then(() => alert("Compte créé !")).catch(e => alert(e.message));
            }
        });
    </script>
</body>
</html>
