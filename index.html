<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SS06 - Site Principal</title>
    <style>
        /* Design de base du site */
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; background: #f4f4f4; }
        
        /* Onglet flottant en haut à gauche */
        .tab-container {
            position: absolute; top: 10px; left: 10px; z-index: 1000;
            background: white; padding: 15px; border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 250px;
        }

        input { width: 100%; padding: 8px; margin: 5px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 8px; background: #FFFC00; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .toggle-link { margin-top: 10px; font-size: 0.75rem; color: #555; cursor: pointer; text-decoration: underline; }

        /* Animation de bienvenue au centre de la page */
        #homePage { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            display: none; text-align: center; background: white; padding: 40px; 
            border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            opacity: 1; transition: opacity 0.5s ease;
        }
    </style>
</head>
<body>

    <div style="padding: 50px;">
        <h1>Bienvenue sur le site SS06</h1>
        <p>Ceci est le contenu principal de ton site.</p>
    </div>

    <div class="tab-container" id="authCard">
        <h4 id="formTitle" style="margin-top:0;">Connexion</h4>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Mot de passe">
        <input type="password" id="passwordConfirm" placeholder="Confirmer mot de passe" style="display:none;">
        <button id="mainBtn">Se connecter</button>
        <div class="toggle-link" id="toggleBtn">Pas de compte ? Créer un compte</div>
    </div>

    <div id="homePage">
        <h2>Connecté !</h2>
        <p>Bienvenue sur SS06.</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAiUzs4ymw1o82ayQ6ywWKZjYC7WXAT3aU",
            authDomain: "site-ss06.firebaseapp.com",
            projectId: "site-ss06",
            storageBucket: "site-ss06.firebasestorage.app",
            messagingSenderId: "473910979829",
            appId: "1:473910979829:web:59ca78239e8527cb7e69bc",
            measurementId: "G-RZD5CQ5H21"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Éléments
        const authCard = document.getElementById('authCard');
        const homePage = document.getElementById('homePage');
        const mainBtn = document.getElementById('mainBtn');
        const toggleBtn = document.getElementById('toggleBtn');
        const passConfirm = document.getElementById('passwordConfirm');
        let isLogin = true;

        toggleBtn.addEventListener('click', () => {
            isLogin = !isLogin;
            document.getElementById('formTitle').innerText = isLogin ? "Connexion" : "Inscription";
            mainBtn.innerText = isLogin ? "Se connecter" : "Créer le compte";
            toggleBtn.innerText = isLogin ? "Pas de compte ? Créer un compte" : "Déjà un compte ? Connexion";
            passConfirm.style.display = isLogin ? "none" : "block";
        });

        function showHome() {
            authCard.style.display = "none";
            homePage.style.display = "block";
            setTimeout(() => {
                homePage.style.opacity = "0";
                setTimeout(() => { homePage.style.display = "none"; }, 500);
            }, 3000);
        }

        mainBtn.addEventListener('click', () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            if (isLogin) {
                signInWithEmailAndPassword(auth, email, password).then(showHome).catch(e => alert(e.message));
            } else {
                if (password !== passConfirm.value) return alert("Les mots de passe ne correspondent pas !");
                createUserWithEmailAndPassword(auth, email, password).then(showHome).catch(e => alert(e.message));
            }
        });
    </script>
</body>
</html>
