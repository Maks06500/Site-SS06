<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>SS06</title>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <style>
        body { margin: 0; background: #0a0a0a; color: white; font-family: sans-serif; overflow: hidden; }
        #particles-js { position: fixed; width: 100%; height: 100%; z-index: -1; }
        .menu-btn { position: fixed; top: 20px; right: 20px; cursor: pointer; font-size: 30px; z-index: 10; }
        .sidebar { display: none; position: fixed; top: 0; right: 0; width: 250px; height: 100%; background: #1a1a1a; padding-top: 60px; z-index: 9; }
        .auth-box { display: none; padding: 20px; border: 1px solid #333; margin: 10px; }
        input { width: 90%; padding: 10px; margin: 5px; background: #000; color: white; border: 1px solid #444; }
        button { width: 90%; padding: 10px; background: #e50914; color: white; border: none; margin: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="particles-js"></div>
    <div class="menu-btn" id="menuBtn">☰</div>

    <div class="sidebar" id="sidebar">
        <div id="accLink" style="padding: 20px; cursor: pointer;">Comptes ▾</div>
        <div id="authBox" class="auth-box">
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="pass" placeholder="Mot de passe">
            <button id="authBtn">Se connecter</button>
        </div>
    </div>

    <script>
        particlesJS("particles-js", { "particles": { "number": { "value": 80 }, "color": { "value": "#ffea00" }, "line_linked": { "enable": true, "color": "#ffea00" } } });
        
        // Navigation
        document.getElementById('menuBtn').onclick = () => {
            const s = document.getElementById('sidebar');
            s.style.display = (s.style.display === 'block') ? 'none' : 'block';
        };
        document.getElementById('accLink').onclick = () => {
            const a = document.getElementById('authBox');
            a.style.display = (a.style.display === 'block') ? 'none' : 'block';
        };
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";

        // --- REMPLACE CETTE PARTIE AVEC TES INFOS FIREBASE ---
        const firebaseConfig = {
            apiKey: "...", 
            authDomain: "...",
            projectId: "...",
            storageBucket: "...",
            messagingSenderId: "...",
            appId: "..."
        };
        // -----------------------------------------------------

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        document.getElementById('authBtn').onclick = () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            signInWithEmailAndPassword(auth, email, pass)
                .then(() => alert("Connecté !"))
                .catch(err => alert(err.message));
        };
    </script>
</body>
</html>
