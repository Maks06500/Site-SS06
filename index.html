<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SS06</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }

        /* Arrière-plan animé */
        body {
            background: linear-gradient(45deg, #FFFC00, #FFFFFF, #FFFC00);
            background-size: 400% 400%;
            animation: gradientAnimation 10s ease infinite;
        }

        /* Nom SS06 avec dégradé animé */
        .brand {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 3rem;
            font-weight: 900;
            text-transform: uppercase;
            
            /* Appliquer le même dégradé que le fond */
            background: linear-gradient(45deg, #FFFFFF, #000000, #FFFFFF);
            background-size: 400% 400%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            
            /* Animation synchronisée */
            animation: gradientAnimation 10s ease infinite;
        }

        @keyframes gradientAnimation {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
    </style>
</head>
<body>

    <div class="brand">SS06</div>

</body>
</html>
