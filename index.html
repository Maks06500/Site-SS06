<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>SS06 - Connexion</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    
    <style>
        /* ... (Mets ici ton CSS habituel pour le fond jaune/blanc) ... */
    </style>
</head>
<body>

    <div class="brand">SS06</div>
    <div class="card">
        <h2 id="formTitle">Connexion</h2>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Mot de passe">
        <button id="mainBtn">Se connecter</button>
        <p id="toggleBtn" style="cursor:pointer; color:blue;">Pas de compte ? S'inscrire</p>
    </div>

    <script>
        // 2. Configuration (Remplace avec tes vraies données Firebase)
        const firebaseConfig = {
            apiKey: "TON_API_KEY",
            authDomain: "TON_PROJET.firebaseapp.com",
            projectId: "TON_PROJET"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // 3. Logique pour basculer entre Inscription et Connexion
        let isLogin = true;
        document.getElementById('toggleBtn').addEventListener('click', () => {
            isLogin = !isLogin;
            document.getElementById('formTitle').innerText = isLogin ? "Connexion" : "Inscription";
            document.getElementById('mainBtn').innerText = isLogin ? "Se connecter" : "S'inscrire";
        });

        // 4. Action au clic sur le bouton
        document.getElementById('mainBtn').addEventListener('click', () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;

            if (isLogin) {
                auth.signInWithEmailAndPassword(email, pass).catch(e => alert(e.message));
            } else {
                auth.createUserWithEmailAndPassword(email, pass).catch(e => alert(e.message));
            }
        });
    </script>
</body>
</html>
