<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SS06 - Boutique</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', sans-serif; background: #0a0a0a; color: white; }
        
        /* Nom SS06 avec animation dégradé */
        .site-name { 
            position: fixed; top: 20px; left: 20px; font-size: 24px; font-weight: bold; z-index: 1001;
            background: linear-gradient(90deg, #000000, #ffea00, #000000);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradient-flow 1.5s linear infinite;
        }

        @keyframes gradient-flow {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }

        /* Menu Hamburger en haut à droite */
        .menu-btn { position: fixed; top: 20px; right: 20px; cursor: pointer; font-size: 28px; z-index: 1001; }
        
        /* Menu latéral */
        .sidebar {
            display: none; position: fixed; top: 0; right: 0; width: 280px; height: 100%;
            background: #1a1a1a; padding: 80px 20px; z-index: 1000; box-shadow: -5px 0 15px rgba(0,0,0,0.5);
        }
        
        /* Formulaire */
        .auth-section { display: none; margin-top: 15px; border: 1px solid #333; padding: 15px; border-radius: 10px; background: #000; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #444; border-radius: 8px; background: #111; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #e50914; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: white; margin-top: 10px; }
        .nav-link { cursor: pointer; padding: 15px 0; font-size: 1.2rem; border-bottom: 1px solid #333; display: block; }
        
        /* Boutique */
        .container { max-width: 800px; margin: 0 auto; padding: 100px 20px; text-align: center; }
        .product-card { background: #111; padding: 30px; border-radius: 20px; border: 1px solid #333; }
        .btn-cart { background: #8b0000; padding: 15px; width: 100%; border: none; border-radius: 10px; color: white; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="site-name">SS06</div>
    <div class="menu-btn" id="menuBtn">☰</div>

    <div class="sidebar" id="sidebar">
        <div class="nav-link">Home</div>
        <div class="nav-link">Products</div>
        <div class="nav-link" id="accountMenu">Comptes ▾</div>
        
        <div class="auth-section" id="authSection">
            <h4 id="formTitle">Connexion</h4>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="password" placeholder="Mot de passe">
            <button id="mainBtn">Se connecter</button>
            <div id="toggleBtn" style="font-size: 0.75rem; margin-top:10px; cursor:pointer; color:#aaa; text-decoration:underline;">Pas de compte ? Créer un compte</div>
        </div>
    </div>

    <div class="container">
        <div class="product-card">
            <h1>Nitro Boost 1 Month</h1>
            <button class="btn-cart">Buy Now ➡️</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";

        // Ton code JS reste identique, je garde la logique pour ne pas casser ton authentification
        const firebaseConfig = {
            apiKey: "AIzaSyAiUzs4ymw1o82ayQ6ywWKZjYC7WXAT3aU",
            authDomain: "site-ss06.firebaseapp.com",
            projectId: "site-ss06",
            storageBucket: "site-ss06.firebasestorage.app",
            messagingSenderId: "473910979829",
            appId: "1:473910979829:web:59ca78239e8527cb7e69bc",
            measurementId: "G-RZD5CQ5H21"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const menuBtn = document.getElementById('menuBtn');
        const sidebar = document.getElementById('sidebar');
        const accountMenu = document.getElementById('accountMenu');
        const authSection = document.getElementById('authSection');
        const mainBtn = document.getElementById('mainBtn');
        const toggleBtn = document.getElementById('toggleBtn');
        let isLogin = true;

        menuBtn.addEventListener('click', () => { sidebar.style.display = (sidebar.style.display === 'block') ? 'none' : 'block'; });
        accountMenu.addEventListener('click', () => { authSection.style.display = (authSection.style.display === 'block') ? 'none' : 'block'; });
        toggleBtn.addEventListener('click', () => {
            isLogin = !isLogin;
            document.getElementById('formTitle').innerText = isLogin ? "Connexion" : "Inscription";
            mainBtn.innerText = isLogin ? "Se connecter" : "Créer le compte";
            toggleBtn.innerText = isLogin ? "Pas de compte ? Créer un compte" : "Déjà un compte ? Connexion";
        });

        mainBtn.addEventListener('click', () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            if (isLogin) {
                signInWithEmailAndPassword(auth, email, password).catch(e => alert(e.message));
            } else {
                createUserWithEmailAndPassword(auth, email, password).catch(e => alert(e.message));
            }
        });
    </script>
</body>
</html>
